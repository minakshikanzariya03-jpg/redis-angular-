<div class="department-container">
  <div class="department-card">

    <h2>Add Department</h2>

    <form [formGroup]="departmentForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Department Code</label>
        <input
          type="text"
          class="form-control"
          formControlName="department_code"
          readonly>
      </div>

      <div class="form-group">
        <label>Department Name <span class="text-danger">*</span></label>
        <input
          type="text"
          class="form-control"
          formControlName="department_name"
          placeholder="Enter Department Name">

        <small
          class="text-danger"
          *ngIf="departmentForm.get('department_name')?.touched &&
                 departmentForm.get('department_name')?.invalid">

          Department Name is required
        </small>
      </div>

      <div class="btn-group">
        <button
          type="submit"
          class="btn-save"
          [disabled]="departmentForm.invalid">

          Save Department
        </button>

        <button
          type="button"
          class="btn-reset"
          (click)="resetForm()">

          Reset
        </button>
      </div>

    </form>

  </div>
</div>
